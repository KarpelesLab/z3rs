name: Fuzz

# Coverage-guided fuzzing via cargo-fuzz / libFuzzer. Requires nightly Rust, so
# this runs out-of-band from the stable PR CI: weekly on Monday at 05:47 UTC,
# plus on manual dispatch. Crashes are uploaded as workflow artifacts so they
# can be added to the per-target seed corpus as regression fixtures.
#
# The `fuzz/` workspace is intentionally excluded from the main Cargo workspace
# (see the root Cargo.toml), so its third-party fuzzing deps never affect the
# dependency-free day-to-day build.

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Seconds to fuzz each target"
        default: "60"
        required: false
  schedule:
    # Weekly. Offset off the hour so we don't pile onto the :00 cron rush.
    - cron: "47 5 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - smt2_run
          - dimacs_parse
    steps:
      - uses: actions/checkout@v6

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          key: fuzz-${{ matrix.target }}

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run ${{ matrix.target }}
        run: |
          DURATION="${{ github.event.inputs.duration || '60' }}"
          cd fuzz
          cargo +nightly fuzz run "${{ matrix.target }}" \
            -- -max_total_time="$DURATION" -print_final_stats=1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30
          if-no-files-found: ignore
